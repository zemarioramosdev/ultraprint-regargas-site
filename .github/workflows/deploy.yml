name: Deploy cPanel via FTP - Ultraprint

on:
  push:
    branches:
      - main # Dispara o deploy automático ao fazer push para a branch main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Build & Deploy Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo-sqlite, pgsql, pdo_pgsql
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }} # Pode usar o IP 186.209.113.105
          username: ${{ secrets.FTP_USERNAME }} # Usuário do FTP (ex: deploy@ultraprintrecargas.com.br ou ultraprint)
          password: ${{ secrets.FTP_PASSWORD }} # Crie esta secret com a senha do seu cPanel
          local-dir: ./backend/
          server-dir: ${{ secrets.BACKEND_REMOTE_PATH }}/ # Ex: ultraprint-backend (sem o prefixo /home/usuario)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/vendor/**

  deploy-frontend:
    name: Build & Deploy Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Next.js Production
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          cd frontend
          npm run build

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # OPÇÃO 1: Next.js Estático - Envia apenas a pasta out compilada
          local-dir: ./frontend/out/
          server-dir: ${{ secrets.FRONTEND_REMOTE_PATH }}/ # Ex: public_html (sem o prefixo /home/usuario)
