name: Deploy cPanel via FTP - Ultraprint

on:
  push:
    branches:
      - main # Dispara o deploy automático ao fazer push para a branch main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend (Laravel)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, pdo_pgsql, pdo_mysql, zip
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --ignore-platform-reqs

      # Empacota vendor/ em um único zip para upload rápido por FTP
      # O FTP-Deploy-Action só faz re-upload se o zip mudar (ex: composer.lock mudou)
      - name: Package vendor as vendor.zip
        run: |
          cd backend
          zip -r vendor.zip vendor/ -q
          echo "vendor.zip criado: $(du -sh vendor.zip | cut -f1)"

      # Gera o .env de produção com os valores das secrets do GitHub
      - name: Create Production .env
        run: |
          cd backend
          cat > .env << 'EOF'
          APP_NAME="Ultraprint Recargas"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://api.ultraprintrecargas.com.br
          FRONTEND_URL=https://ultraprintrecargas.com.br

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=${{ secrets.DB_CONNECTION }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file
          BROADCAST_CONNECTION=log

          MAIL_MAILER=smtp
          MAIL_HOST=smtp.gmail.com
          MAIL_PORT=587
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=tls
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_USERNAME }}
          MAIL_FROM_NAME="Ultraprint Recargas"

          DEPLOY_TOKEN=${{ secrets.DEPLOY_TOKEN }}
          EOF
          # Remove indentação gerada pelo heredoc YAML
          sed -i 's/^          //' .env

      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ${{ secrets.BACKEND_REMOTE_PATH }}/
          state-name: .ftp-backend-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/vendor/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1

      # Aguarda o FTP terminar de propagar e chama o deploy-hook para:
      # 1) Extrair vendor.zip → vendor/
      # 2) Rodar php artisan migrate --force
      # 3) Cachear config e rotas
      - name: Run Post-Deploy Hook (migrations + cache)
        run: |
          echo "Aguardando propagação do FTP..."
          sleep 20
          echo "Chamando deploy hook..."
          HTTP_STATUS=$(curl -s -o /tmp/hook_response.json -w "%{http_code}" \
            "https://api.ultraprintrecargas.com.br/deploy-hook.php?token=${{ secrets.DEPLOY_TOKEN }}")
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/hook_response.json
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "207" ]; then
            echo "::warning::Deploy hook retornou status $HTTP_STATUS. Verifique o servidor manualmente."
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Frontend (Next.js Static Export)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Next.js (Static Export)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          cd frontend
          npm run build

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/out/
          server-dir: ${{ secrets.FRONTEND_REMOTE_PATH }}/
          state-name: .ftp-frontend-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
