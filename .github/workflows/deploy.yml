name: Deploy cPanel - Ultraprint

on:
  push:
    branches:
      - main # Dispara o deploy automático ao fazer push para a branch main

jobs:
  deploy-backend:
    name: Build & Deploy Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pdo-sqlite, pgsql, pdo_pgsql
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy Backend Files via Rsync
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          # Sincroniza a pasta do Laravel com o servidor cPanel (excluindo arquivos locais e logs)
          rsync -avz -e "ssh -p ${PORT:-22} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/logs/*.log' \
            --exclude='.env' \
            backend/ ${{ secrets.SH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.BACKEND_REMOTE_PATH }}/

      - name: Execute Remote Laravel Commands
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          # Executa comandos artisan no servidor para limpar cache e rodar migrações de forma segura
          # Dica: Se o PHP padrão da hospedagem cPanel for antigo, você pode trocar "php" pelo caminho absoluto (ex: "/usr/local/bin/ea-php82")
          ssh -p ${PORT:-22} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.SH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.BACKEND_REMOTE_PATH }} && \
            php artisan migrate --force && \
            php artisan config:cache && \
            php artisan route:cache && \
            php artisan view:cache
          "

  deploy-frontend:
    name: Build & Deploy Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: deploy-backend # Garante que o backend seja atualizado antes/concomitantemente

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Next.js Production
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          cd frontend
          npm run build

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy Frontend Files via Rsync
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          
          # ==========================================
          # OPÇÃO 1: EXPORTAÇÃO ESTÁTICA (Next.js out/)
          # Se você ativou "output: 'export'" no next.config.mjs, descomente a linha abaixo e comente a OPÇÃO 2:
          # ==========================================
          # rsync -avz -e "ssh -p ${PORT:-22} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" frontend/out/ ${{ secrets.SH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONTEND_REMOTE_PATH }}/
          
          # ==========================================
          # OPÇÃO 2: APLICAÇÃO NODE.JS ATIVA (cPanel Node.js App)
          # Padrão: Sincroniza o diretório inteiro compilado e recarrega o app Node no cPanel
          # ==========================================
          rsync -avz -e "ssh -p ${PORT:-22} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude='.git*' \
            --exclude='.github*' \
            --exclude='node_modules' \
            frontend/ ${{ secrets.SH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONTEND_REMOTE_PATH }}/

      - name: Restart Node.js Application (Opcional - para OPÇÃO 2)
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          # O cPanel com Passenger reinicia a aplicacao ao detectar alteracao no arquivo tmp/restart.txt
          ssh -p ${PORT:-22} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.SH_USER }}@${{ secrets.SSH_HOST }} "
            mkdir -p ${{ secrets.FRONTEND_REMOTE_PATH }}/tmp && \
            touch ${{ secrets.FRONTEND_REMOTE_PATH }}/tmp/restart.txt
          "
